<!-- Bóng nổi -->
<div id="kaiz-floating-btn" class="kaiz-floating-btn interactable" title="Toggle Kaiz Agent">
    <i class="fa-solid fa-yin-yang"></i>
</div>

<!-- Khung chat -->
<div id="kaiz-chat-window" class="kaiz-chat-window kaiz-hidden">
    <div class="kaiz-chat-header" id="kaiz-chat-header">
        <div class="kaiz-header-title">
            <i class="fa-solid fa-bars interactable" id="kaiz-chat-menu-btn" style="margin-right: 8px; cursor: pointer;"></i>
            <i class="fa-solid fa-wand-magic-sparkles"></i> <span id="kaiz-chat-title">Kaiz Agent</span>
        </div>
        <div class="kaiz-header-actions">
            <i id="kaiz-chat-close" class="fa-solid fa-xmark interactable" style="cursor: pointer;"></i>
        </div>
    </div>
    
    <!-- Sidebar Chat List -->
    <div id="kaiz-chat-sidebar" class="kaiz-chat-sidebar kaiz-hidden-sidebar" style="display:none; position:absolute; top:54px; left:0; width:200px; bottom:0; background:rgba(20,25,35,0.95); border-right:1px solid rgba(255,255,255,0.1); z-index:10002; flex-direction:column;">
        <div style="padding:10px; border-bottom:1px solid rgba(255,255,255,0.1);">
            <button id="kaiz-new-chat-btn" class="menu_button interactable" style="width:100%;"><i class="fa-solid fa-plus"></i> New Chat</button>
        </div>
        <div id="kaiz-chat-list" style="flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:5px;">
            <!-- Danh sách chat -->
        </div>
    </div>
    
    <div id="kaiz-chat-history" class="kaiz-chat-history">
        <!-- Tin nhắn sẽ được nhúng vào đây -->
        <div class="kaiz-msg kaiz-msg-agent">
            <div class="kaiz-msg-avatar"><i class="fa-solid fa-yin-yang"></i></div>
            <div class="kaiz-msg-content">Hello! I am Kaiz Agent, running inside SillyTavern sandbox. How can I assist you today?</div>
        </div>
    </div>
    
    <div class="kaiz-chat-input-area">
        <textarea id="kaiz-chat-input" class="kaiz-chat-input" placeholder="Nhập yêu cầu của bạn (Shift+Enter để xuống dòng)..." rows="1"></textarea>
        <button id="kaiz-chat-send" class="kaiz-chat-send">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<!-- Debug Modal -->
<div id="kaiz-debug-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:400px; background:var(--SmartThemeBlurTintColor); border:1px solid var(--SmartThemeBorderColor); border-radius:10px; z-index:99999; padding:20px; color:var(--SmartThemeBodyColor); backdrop-filter:blur(10px); box-shadow:0 10px 30px rgba(0,0,0,0.5);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">
        <h3 style="margin:0; font-size:16px;"><i class="fa-solid fa-bug"></i> Tool Debugger (Dry Run)</h3>
        <i id="kaiz-debug-close" class="fa-solid fa-xmark interactable" style="cursor:pointer; font-size:18px;"></i>
    </div>
    <div id="kaiz-debug-list" style="max-height:300px; overflow-y:auto; display:flex; flex-direction:column; gap:8px;">
        <!-- Danh sách tool sẽ được nhúng vào đây -->
    </div>
    <div style="margin-top:15px; text-align:right;">
        <button id="kaiz-debug-run" class="menu_button interactable"><i class="fa-solid fa-play"></i> Run Tests</button>
    </div>
</div>
