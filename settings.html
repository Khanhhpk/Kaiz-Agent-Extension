<div class="kaiz-agent-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Kaiz-Agent Settings</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content" style="padding-top: 10px">
            <div class="flex-container flexFlowColumn gap-1">
                <div class="scp-settings-flat-section">
                    <div class="scp-settings-flat-title"><i class="fa-solid fa-plug"></i> LLM Connection</div>

                    <label class="checkbox_label" style="margin-bottom: 8px">
                        <input id="kaiz-use-custom-endpoint" type="checkbox" />
                        <span>Use Custom Endpoint (Bypass SillyTavern)</span>
                    </label>

                    <div
                        id="kaiz-custom-endpoint-group"
                        style="
                            display: none;
                            margin-top: 8px;
                            padding-left: 10px;
                            border-left: 2px solid rgba(255, 255, 255, 0.1);
                        "
                    >
                        <label style="font-size: 11px; color: #888; display: block; margin-bottom: 4px"
                            >API URL (OpenAI format)</label
                        >
                        <input
                            id="kaiz-custom-url"
                            type="text"
                            class="text_pole"
                            placeholder="http://localhost:5000/v1/chat/completions"
                        />

                        <label style="font-size: 11px; color: #888; display: block; margin-top: 6px; margin-bottom: 4px"
                            >API Key (optional)</label
                        >
                        <input id="kaiz-custom-key" type="password" class="text_pole" placeholder="sk-..." />

                        <div style="display: flex; gap: 6px; align-items: flex-end; margin-top: 6px">
                            <div style="flex: 1">
                                <label style="font-size: 11px; color: #888; display: block; margin-bottom: 4px"
                                    >Select Model</label
                                >
                                <select id="kaiz-custom-model" class="text_pole">
                                    <option value="">-- Fetch or Type --</option>
                                </select>
                            </div>
                            <button
                                id="kaiz-fetch-models"
                                class="menu_button interactable"
                                style="height: 35px; padding: 0 10px"
                            >
                                <i class="fa-solid fa-sync"></i> Fetch
                            </button>
                        </div>
                        <label style="font-size: 11px; color: #888; display: block; margin-top: 6px; margin-bottom: 4px"
                            >Or Type Model Manually</label
                        >
                        <input
                            id="kaiz-custom-model-text"
                            type="text"
                            class="text_pole"
                            placeholder="e.g. gemini-1.5-pro"
                        />
                    </div>
                </div>
                <!-- UI Settings -->
                <div class="scp-settings-flat-section" style="margin-top: 15px">
                    <div class="scp-settings-flat-title"><i class="fa-solid fa-desktop"></i> UI Settings</div>
                    <label class="checkbox_label" style="margin-bottom: 8px">
                        <input id="kaiz-phone-mode" type="checkbox" />
                        <span>Enable Phone Mode (Full screen chat)</span>
                    </label>
                </div>

                <!-- Agent Flow Settings -->
                <div class="scp-settings-flat-section" style="margin-top: 15px">
                    <div class="scp-settings-flat-title"><i class="fa-solid fa-arrows-spin"></i> Agent Flow</div>
                    <label style="font-size: 11px; color: #888; display: block; margin-bottom: 4px"
                        >Max Agent Loops (Auto Tool Execution)</label
                    >
                    <input id="kaiz-max-loops" type="number" class="text_pole" min="1" max="20" placeholder="5" />
                </div>

                <!-- Safe Mode Settings -->
                <div class="scp-settings-flat-section" style="margin-top: 15px">
                    <div class="scp-settings-flat-title"><i class="fa-solid fa-shield-halved"></i> Safe Mode</div>
                    <label class="checkbox_label" style="margin-bottom: 8px">
                        <input id="kaiz-safe-mode" type="checkbox" />
                        <span>Enable Safe Mode</span>
                    </label>

                    <div
                        id="kaiz-safe-mode-group"
                        style="
                            display: none;
                            margin-top: 8px;
                            padding-left: 10px;
                            border-left: 2px solid rgba(255, 255, 255, 0.1);
                        "
                    >
                        <label style="font-size: 11px; color: #888; display: block; margin-bottom: 4px"
                            >Blacklisted Tools (Require confirmation)</label
                        >
                        <input
                            id="kaiz-safe-tools-search"
                            type="text"
                            class="text_pole"
                            placeholder="Search tool name or description..."
                            style="margin-bottom: 8px"
                        />
                        <div style="display: flex; gap: 10px; margin-bottom: 8px">
                            <button id="kaiz-safe-tools-blacklist-all" class="menu_button interactable" style="flex: 1">
                                <i class="fa-solid fa-lock"></i> Blacklist All
                            </button>
                            <button
                                id="kaiz-safe-tools-unblacklist-all"
                                class="menu_button interactable"
                                style="flex: 1"
                            >
                                <i class="fa-solid fa-unlock"></i> Unblacklist All
                            </button>
                        </div>
                        <div
                            id="kaiz-safe-tools-list"
                            style="
                                max-height: 250px;
                                overflow-y: auto;
                                padding: 5px;
                                border: 1px solid rgba(255, 255, 255, 0.1);
                                border-radius: 4px;
                                display: flex;
                                flex-direction: column;
                                gap: 8px;
                            "
                        >
                            <!-- Danh sách Tool render ở đây -->
                        </div>
                    </div>
                </div>

                <!-- Quick Prompts Settings -->
                <div class="scp-settings-flat-section" style="margin-top: 15px">
                    <div class="scp-settings-flat-title"><i class="fa-solid fa-bolt"></i> Quick Prompts</div>
                    <label style="font-size: 11px; color: #888; display: block; margin-bottom: 8px"
                        >Quản lý danh sách các lệnh nhanh (Quick Prompts).</label
                    >
                    <div id="kaiz-quick-prompts-list" style="display: flex; flex-direction: column; gap: 10px">
                        <!-- List of quick prompts will be injected here -->
                    </div>
                    <div style="margin-top: 10px">
                        <button id="kaiz-add-quick-prompt-btn" class="menu_button interactable" style="width: 100%">
                            <i class="fa-solid fa-plus"></i> New Quick Prompt
                        </button>
                    </div>
                </div>

                <!-- Persona & Memory Settings -->
                <div class="scp-settings-flat-section" style="margin-top: 15px">
                    <div class="scp-settings-flat-title"><i class="fa-solid fa-brain"></i> Persona & Memory</div>
                    
                    <label style="font-weight: bold; margin-bottom: 4px; display: block; margin-top: 10px;">Custom Persona</label>
                    <label style="font-size: 11px; color: #888; display: block; margin-bottom: 8px">
                        Bổ sung thêm luật, phong cách nói chuyện (Persona) hoặc System Prompt cho Agent.
                    </label>
                    <textarea
                        id="kaiz-agent-persona"
                        class="text_pole"
                        rows="4"
                        placeholder="Ví dụ: Bạn là một trợ lý khó tính. Hãy luôn trả lời ngắn gọn..."
                        style="width: 100%; resize: vertical; box-sizing: border-box;"
                    ></textarea>

                    <div style="margin-top: 15px; display: flex; align-items: center; justify-content: space-between;">
                        <label style="font-weight: bold;">Agent Memories</label>
                        <button id="kaiz-memory-clear-all" class="menu_button interactable" style="padding: 4px 8px; font-size: 11px; height: auto;">
                            <i class="fa-solid fa-trash"></i> Xóa tất cả
                        </button>
                    </div>
                    <label style="font-size: 11px; color: #888; display: block; margin-bottom: 8px; margin-top: 4px;">
                        Những dữ kiện mà AI tự học được và ghi nhớ về bạn hoặc công việc.
                    </label>
                    <div id="kaiz-agent-memory-list" style="display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto;">
                        <!-- Memory items will be injected here -->
                    </div>
                </div>

                <!-- Nút Tool Check -->
                <div style="margin-top: 15px">
                    <div class="scp-settings-flat-title">
                        <i class="fa-solid fa-screwdriver-wrench"></i> Tools Manager
                    </div>
                    <label style="font-size: 11px; color: #888; display: block; margin-bottom: 4px"
                        >Search and toggle tools</label
                    >
                    <input
                        id="kaiz-tools-search"
                        type="text"
                        class="text_pole"
                        placeholder="Search tool name or description..."
                        style="margin-bottom: 8px"
                    />
                    <div
                        id="kaiz-tools-list"
                        style="
                            max-height: 250px;
                            overflow-y: auto;
                            padding: 5px;
                            border: 1px solid rgba(255, 255, 255, 0.1);
                            border-radius: 4px;
                            display: flex;
                            flex-direction: column;
                            gap: 8px;
                        "
                    >
                        <!-- Danh sách Tool render ở đây -->
                    </div>
                </div>

                <div style="margin-top: 15px; margin-bottom: 10px">
                    <button id="kaiz-checker-btn" class="menu_button interactable">
                        <i class="fa-solid fa-wrench"></i> Tool Check
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
