<div class="kaiz-agent-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Kaiz-Agent Settings</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content" style="padding-top:10px;">
            <div class="flex-container flexFlowColumn gap-1">
                
                <div class="scp-settings-flat-section">
                    <div class="scp-settings-flat-title"><i class="fa-solid fa-plug"></i> LLM Connection</div>
                    
                    <label class="checkbox_label" style="margin-bottom:8px">
                        <input id="kaiz-use-custom-endpoint" type="checkbox" />
                        <span>Use Custom Endpoint (Bypass SillyTavern)</span>
                    </label>

                    <div id="kaiz-custom-endpoint-group" style="display:none; margin-top:8px; padding-left:10px; border-left: 2px solid rgba(255,255,255,0.1);">
                        <label style="font-size:11px; color:#888; display:block; margin-bottom:4px">API URL (OpenAI format)</label>
                        <input id="kaiz-custom-url" type="text" class="text_pole" placeholder="http://localhost:5000/v1/chat/completions" />
                        
                        <label style="font-size:11px; color:#888; display:block; margin-top:6px; margin-bottom:4px">API Key (optional)</label>
                        <input id="kaiz-custom-key" type="password" class="text_pole" placeholder="sk-..." />
                        
                        <div style="display:flex; gap:6px; align-items:flex-end; margin-top:6px;">
                            <div style="flex:1;">
                                <label style="font-size:11px; color:#888; display:block; margin-bottom:4px">Select Model</label>
                                <select id="kaiz-custom-model" class="text_pole">
                                    <option value="">-- Fetch or Type --</option>
                                </select>
                            </div>
                            <button id="kaiz-fetch-models" class="menu_button interactable" style="height:35px; padding:0 10px;">
                                <i class="fa-solid fa-sync"></i> Fetch
                            </button>
                        </div>
                        <label style="font-size:11px; color:#888; display:block; margin-top:6px; margin-bottom:4px">Or Type Model Manually</label>
                        <input id="kaiz-custom-model-text" type="text" class="text_pole" placeholder="e.g. gemini-1.5-pro" />
                    </div>
                </div>
                <!-- Agent Flow Settings -->
                <div class="scp-settings-flat-section" style="margin-top: 15px;">
                    <div class="scp-settings-flat-title"><i class="fa-solid fa-arrows-spin"></i> Agent Flow</div>
                    <label style="font-size:11px; color:#888; display:block; margin-bottom:4px">Max Agent Loops (Auto Tool Execution)</label>
                    <input id="kaiz-max-loops" type="number" class="text_pole" min="1" max="20" placeholder="5" />
                </div>

                <!-- Nút Debug -->
                <div style="margin-top: 15px;">
                    <button id="kaiz-debug-btn" class="menu_button interactable">
                        <i class="fa-solid fa-bug"></i> Debug Tools
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
